<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browser Agent Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#f5f3ee;
    --surface:#ffffff;
    --surface-2:#faf8f3;
    --border:#e3ddd0;
    --ink:#211f1b;
    --muted:#7c7568;
    --faint:#a39c8d;
    --accent:#2f6f5e;
    --accent-ink:#ffffff;
    --accent-soft:#e3efe9;
    --warning:#a9701d;
    --warning-soft:#f3e8d5;
    --critical:#ab3c2e;
    --critical-soft:#f6e2de;
    --idle:#8d8676;
    --shadow:0 1px 2px rgba(33,31,27,0.05), 0 4px 14px rgba(33,31,27,0.04);
  }
  :root[data-theme="dark"]{
    --bg:#15171a; --surface:#1c1f23; --surface-2:#202327; --border:#2b2f35;
    --ink:#eae7e0; --muted:#9a978e; --faint:#6d6a63;
    --accent:#57b79c; --accent-ink:#0c1a16; --accent-soft:#1e3530;
    --warning:#d9a24f; --warning-soft:#332714;
    --critical:#e17b6a; --critical-soft:#3a1f1a; --idle:#75726a;
    --shadow:0 1px 2px rgba(0,0,0,0.25), 0 6px 18px rgba(0,0,0,0.28);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#15171a; --surface:#1c1f23; --surface-2:#202327; --border:#2b2f35;
      --ink:#eae7e0; --muted:#9a978e; --faint:#6d6a63;
      --accent:#57b79c; --accent-ink:#0c1a16; --accent-soft:#1e3530;
      --warning:#d9a24f; --warning-soft:#332714;
      --critical:#e17b6a; --critical-soft:#3a1f1a; --idle:#75726a;
      --shadow:0 1px 2px rgba(0,0,0,0.25), 0 6px 18px rgba(0,0,0,0.28);
    }
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:ui-monospace,"SFMono-Regular","Cascadia Mono","Consolas","Liberation Mono",monospace; font-variant-numeric:tabular-nums; }
  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--muted); }
  button, input, select, textarea{ font:inherit; color:inherit; }
  a{ color:inherit; text-decoration:none; }

  .app{ height:100vh; display:grid; grid-template-rows:52px 1fr; min-height:600px; }

  /* ---- Top bar ---- */
  .topbar{ display:flex; align-items:center; gap:14px; padding:0 18px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .brand{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:14px; }
  .brand .mark{ width:18px;height:18px;border-radius:5px; background:var(--accent); display:inline-flex;align-items:center;justify-content:center; flex-shrink:0; }
  .brand .mark svg{ width:11px;height:11px; }
  .topbar .session-name{ color:var(--muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topbar .session-name b{ color:var(--ink); font-weight:600; }
  .status-pill{ display:inline-flex; align-items:center; gap:6px; padding:4px 10px 4px 8px; border-radius:999px; background:var(--surface-2); color:var(--idle); font-size:12px; font-weight:600; margin-left:auto; flex-shrink:0; }
  .status-pill .dot{ width:6px;height:6px;border-radius:50%; background:currentColor; }
  .status-pill.running{ background:var(--accent-soft); color:var(--accent); }
  .status-pill.running .dot{ animation:pulse 1.4s ease-in-out infinite; }
  .status-pill.done{ background:var(--accent-soft); color:var(--accent); }
  .status-pill.error{ background:var(--critical-soft); color:var(--critical); }
  .status-pill.cancelled{ background:var(--surface-2); color:var(--faint); }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
  @media (prefers-reduced-motion: reduce){ .status-pill.running .dot{ animation:none; } }
  .topbar-actions{ display:flex; gap:8px; flex-shrink:0; }
  .pool-text{ font-size:12px; color:var(--faint); white-space:nowrap; }
  .health-dot{ width:7px;height:7px;border-radius:50%; background:var(--faint); flex-shrink:0; }
  .health-dot.up{ background:var(--accent); }
  .theme-toggle{ display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; }
  .theme-toggle button{ border:none; background:var(--surface); color:var(--muted); font-size:11px; font-weight:600; padding:5px 9px; cursor:pointer; }
  .theme-toggle button.active{ background:var(--accent); color:var(--accent-ink); }
  .theme-toggle button:focus-visible{ outline:2px solid var(--accent); outline-offset:-2px; }

  /* ---- Main grid ---- */
  .main{ display:grid; grid-template-columns:240px minmax(0,1fr) 320px; min-height:0; }
  .main.right-rail-hidden{ grid-template-columns:240px minmax(0,1fr); }
  .main.right-rail-hidden .right-rail{ display:none; }
  .col{ min-height:0; display:flex; flex-direction:column; border-right:1px solid var(--border); }
  .main > .col:last-child, .right-rail{ border-right:none; }
  .col-header{ padding:14px 16px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:8px; }
  .col-body{ flex:1; min-height:0; overflow-y:auto; padding:0 8px 12px; }

  /* ---- History ---- */
  .history{ background:var(--surface-2); }
  .new-session{ margin:0 8px 10px; display:flex; align-items:center; justify-content:center; gap:6px; padding:8px 10px; border-radius:8px; border:1px dashed var(--faint); color:var(--muted); font-size:12.5px; font-weight:600; cursor:pointer; background:transparent; width:calc(100% - 16px); }
  .new-session:hover{ border-color:var(--accent); color:var(--accent); }
  .new-session.active{ border-style:solid; border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }
  .history-group{ padding:10px 8px 2px; font-size:10.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--faint); }
  .list-item{ display:block; padding:9px 10px; border-radius:8px; cursor:pointer; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; }
  .list-item:hover{ background:var(--surface); }
  .list-item.active{ background:var(--surface); box-shadow:0 0 0 1px var(--border); }
  .list-item .title{ font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-item .meta{ display:flex; align-items:center; gap:6px; margin-top:3px; font-size:11.5px; color:var(--faint); }
  .badge{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; text-transform:uppercase; letter-spacing:.03em; }
  .badge.running{ background:var(--warning-soft); color:var(--warning); }
  .badge.done{ background:var(--accent-soft); color:var(--accent); }
  .badge.error{ background:var(--critical-soft); color:var(--critical); }
  .badge.cancelled{ background:var(--surface-2); color:var(--faint); }
  .badge.needs-approval{ background:var(--critical-soft); color:var(--critical); animation:pulse 1.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){ .badge.needs-approval{ animation:none; } }
  .empty-hint{ color:var(--faint); font-size:12.5px; padding:16px 12px; text-align:center; }

  /* ---- Chat ---- */
  .chat{ background:var(--surface); }
  .chat .col-body{ padding:18px 22px; display:flex; flex-direction:column; gap:14px; }
  .transcript-empty{ margin:auto; text-align:center; color:var(--faint); font-size:13px; max-width:280px; }
  .msg{ display:flex; gap:10px; max-width:100%; }
  .msg .avatar{ width:26px;height:26px;border-radius:7px;flex-shrink:0; display:flex;align-items:center;justify-content:center; font-size:11px;font-weight:700; }
  .msg.user{ align-self:flex-end; flex-direction:row-reverse; }
  .msg.user .avatar{ background:var(--surface-2); color:var(--muted); border:1px solid var(--border); }
  .msg.agent .avatar{ background:var(--accent); color:var(--accent-ink); }
  .bubble{ padding:10px 13px; border-radius:12px; font-size:13.5px; line-height:1.55; max-width:440px; }
  .msg.user .bubble{ background:var(--surface-2); border:1px solid var(--border); border-top-right-radius:3px; }
  .msg.agent .bubble{ background:var(--accent-soft); border-top-left-radius:3px; }
  .msg.agent.error .bubble{ background:var(--critical-soft); color:var(--critical); }
  .msg .meta-line{ font-size:11px; color:var(--faint); margin-top:4px; }
  .msg.user .meta-line{ text-align:right; }
  .stat-line{ display:flex; gap:12px; font-size:11.5px; color:var(--faint); margin-top:5px; }

  /* ---- Human-in-the-loop approval cards ---- */
  .approval-bubble{ background:var(--warning-soft) !important; border:1px solid var(--warning); max-width:440px; }
  .approval-title{ font-weight:700; font-size:12px; color:var(--warning); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .approval-cmd{ font-size:12px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 8px; margin-bottom:10px; word-break:break-word; }
  .approval-actions{ display:flex; gap:8px; }
  .btn-approve, .btn-deny{ flex:1; border:none; border-radius:7px; padding:7px 10px; font-size:12.5px; font-weight:700; cursor:pointer; }
  .btn-approve{ background:var(--accent); color:var(--accent-ink); }
  .btn-deny{ background:var(--critical); color:#fff; }
  .btn-approve:hover, .btn-deny:hover{ filter:brightness(1.08); }
  .btn-edit{ flex:0 0 auto; border:1px solid var(--border); background:transparent; color:var(--muted); border-radius:7px; padding:7px 14px; font-size:12.5px; font-weight:700; cursor:pointer; }
  .btn-edit:hover{ border-color:var(--accent); color:var(--accent); }

  /* ---- Plan bubble (shown live in the chat as soon as it's drafted) ---- */
  .plan-bubble{ background:var(--accent-soft) !important; border:1px solid var(--accent); max-width:460px; }
  .plan-bubble-title{ font-weight:700; font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
  .plan-bubble-title .plan-badge{ font-size:10px; padding:1px 7px; border-radius:5px; font-weight:700; text-transform:none; letter-spacing:0; }
  .plan-badge.ok{ background:var(--accent); color:var(--accent-ink); }
  .plan-badge.fail{ background:var(--critical-soft); color:var(--critical); }
  .plan-bubble-text{ font-size:13px; line-height:1.6; white-space:pre-wrap; color:var(--ink); margin-bottom:8px; }
  .plan-edit-textarea{ width:100%; background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:6px; padding:8px; font-size:13px; font-family:inherit; line-height:1.6; resize:vertical; min-height:110px; margin-bottom:8px; }
  .plan-edit-textarea:focus{ outline:2px solid var(--accent); outline-offset:1px; }

  /* W14: Website Learning banner (missing manual / learning progress / done / error) */
  .manual-banner-wrap{ flex-shrink:0; padding:10px 16px 0; }
  .manual-banner{ border-radius:8px; padding:10px 12px; font-size:12.5px; }
  .manual-banner.missing{ background:var(--warning-soft); border:1px solid var(--warning); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .manual-banner.missing .manual-banner-title{ color:var(--warning); font-weight:700; }
  .manual-banner-login-fields{ display:flex; gap:6px; flex:1 1 auto; min-width:220px; }
  .manual-banner-login-fields input{ flex:1 1 0; min-width:0; padding:5px 8px; font-size:12px; border-radius:6px; border:1px solid var(--warning); background:var(--bg); color:var(--ink); }
  .manual-banner-cred-choice{ display:flex; gap:14px; flex:1 1 auto; min-width:220px; font-size:12px; }
  .manual-banner-cred-choice label{ display:flex; align-items:center; gap:5px; cursor:pointer; white-space:nowrap; }
  .manual-banner.learning{ background:var(--accent-soft); border:1px solid var(--accent); }
  .manual-banner.learning .manual-banner-title{ color:var(--accent); font-weight:700; margin-bottom:6px; }
  .manual-banner-current{ color:var(--muted); font-size:11.5px; margin-bottom:4px; word-break:break-all; }
  .manual-banner-checklist{ display:flex; flex-direction:column; gap:2px; margin:4px 0; max-height:110px; overflow-y:auto; }
  .manual-banner-checklist .item.done{ color:var(--accent); }
  .manual-banner-checklist .item.pending{ color:var(--faint); }
  .manual-banner-pct{ font-weight:700; margin-top:6px; }
  .manual-banner.known{ background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .manual-banner.known .manual-banner-title{ color:var(--muted); font-weight:600; }
  .manual-banner.done{ background:var(--accent-soft); border:1px solid var(--accent); color:var(--accent); }
  .manual-banner.error{ background:var(--critical-soft); border:1px solid var(--critical); color:var(--critical); }
  .manual-banner-learn-btn{ flex:0 0 auto; border:none; border-radius:7px; padding:7px 14px; font-size:12.5px; font-weight:700; cursor:pointer; background:var(--warning); color:#1a1200; }
  .manual-banner-learn-btn:hover{ filter:brightness(1.08); }

  .composer{ flex-shrink:0; border-top:1px solid var(--border); padding:12px 16px 16px; display:flex; flex-direction:column; gap:8px; }
  .composer-row{ display:flex; gap:8px; }
  .composer-row > div{ flex:1; min-width:0; }
  .composer label{ font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:3px; }
  .composer input[type=text], .composer input[type=url], .composer input[type=number], .composer select, .composer textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--ink);
    border-radius:8px; padding:8px 10px; font-size:12.5px;
  }
  .composer textarea{ resize:vertical; min-height:38px; max-height:100px; }
  .composer input:focus, .composer select:focus, .composer textarea:focus{ outline:2px solid var(--accent); outline-offset:1px; }
  .composer-checks{ display:flex; gap:16px; flex-wrap:wrap; }
  .check-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .check-row input{ width:auto; }
  .check-row .warn-hint{ color:var(--warning); font-size:10.5px; }
  .composer-send-row{ display:flex; align-items:center; gap:10px; }
  .send-btn{ flex-shrink:0; padding:9px 18px; border-radius:9px; border:none; background:var(--accent); color:var(--accent-ink); font-weight:700; font-size:13px; cursor:pointer; }
  .send-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .send-btn:hover:not(:disabled){ filter:brightness(1.05); }
  .stop-btn{ flex-shrink:0; padding:9px 18px; border-radius:9px; border:1px solid var(--critical); background:transparent; color:var(--critical); font-weight:700; font-size:13px; cursor:pointer; }
  .stop-btn:hover{ background:var(--critical-soft); }
  .stop-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .composer-error{ font-size:12px; color:var(--critical); }

  /* ---- Log toggle (manual show/hide — see .right-rail-hidden on .main) ---- */
  .log-toggle-btn{ border:1px solid var(--border); background:var(--surface-2); color:var(--muted); font-size:11px; font-weight:600; padding:4px 10px; border-radius:7px; cursor:pointer; flex-shrink:0; }
  .log-toggle-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .log-toggle-btn.active{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

  /* ---- Right rail: Log (collapsed by default — toggled by .log-toggle-btn) ---- */
  .right-rail{ display:flex; flex-direction:column; min-height:0; }
  .right-rail .col{ border-right:none; }
  .log-placeholder{ color:var(--faint); font-size:12.5px; padding:8px 8px; }

  .log-line{ display:flex; gap:8px; padding:4px 8px; font-size:11.5px; border-radius:6px; align-items:baseline; }
  .log-line:hover{ background:var(--surface-2); }
  .log-line .t{ color:var(--faint); flex-shrink:0; width:20px; text-align:right; }
  .log-line .lvl{ flex-shrink:0; width:38px; font-weight:700; }
  .log-line .lvl.info{ color:var(--muted); }
  .log-line .lvl.ok{ color:var(--accent); }
  .log-line .lvl.err{ color:var(--critical); }
  .log-line .msg-text{ color:var(--ink); overflow-wrap:anywhere; }
  .log-line .result-text{ color:var(--faint); overflow-wrap:anywhere; }

  @media (max-width:920px){
    .main{ grid-template-columns:1fr; grid-template-rows:auto 1fr auto; }
    .col{ border-right:none; border-bottom:1px solid var(--border); }
    .history{ max-height:180px; }
    .right-rail{ max-height:280px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <span class="mark"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12a8 8 0 1 1 8 8" stroke="white" stroke-width="2.4" stroke-linecap="round"/><circle cx="12" cy="4" r="1.6" fill="white"/></svg></span>
      Browser Agent
    </div>
    <div class="session-name" id="sessionName">New session</div>
    <div class="status-pill idle" id="statusPill"><span class="dot"></span><span id="statusText">Idle</span></div>
    <div class="topbar-actions">
      <span class="health-dot" id="healthDot" title="API health"></span>
      <span class="pool-text" id="poolText">pool —</span>
      <div class="theme-toggle" id="themeToggle">
        <button data-theme="light">Light</button>
        <button data-theme="dark">Dark</button>
      </div>
    </div>
  </div>

  <div class="main right-rail-hidden" id="mainGrid">
    <!-- HISTORY -->
    <div class="col history">
      <div class="col-header"><span class="eyebrow">History</span></div>
      <div class="col-body">
        <button class="new-session" id="btnNewSession">+ New session</button>
        <div id="historyList"></div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="col chat">
      <div class="col-header"><span class="eyebrow">Chat</span><button class="log-toggle-btn" id="btnToggleLog">Show log</button></div>
      <div class="col-body" id="transcript"></div>
      <div class="manual-banner-wrap" id="manualBanner" style="display:none;"></div>
      <div class="composer">
        <div class="composer-row">
          <div>
            <label for="url">Target URL</label>
            <input type="url" id="url" placeholder="https://www.example.com" value="https://www.saucedemo.com/" list="urlHistory" autocomplete="off">
            <datalist id="urlHistory"></datalist>
          </div>
          <div style="flex:0 0 150px;">
            <label for="provider">Provider</label>
            <select id="provider">
              <option value="">default</option>
              <option value="anthropic">Anthropic</option>
              <option value="gemini">Gemini</option>
              <option value="groq">Groq</option>
            </select>
          </div>
          <div style="flex:0 0 100px;">
            <label for="maxSteps">Max steps</label>
            <input type="number" id="maxSteps" value="30" min="1" max="200">
          </div>
        </div>
        <div>
          <label for="goal">Goal</label>
          <textarea id="goal" rows="2" placeholder="e.g. add the first item to cart and checkout"></textarea>
        </div>
        <div class="composer-checks">
          <label class="check-row"><input type="checkbox" id="headless"> Headless (hide the browser window) <span class="warn-hint">(unchecked: a real browser window opens and stays open until you close it)</span></label>
          <label class="check-row"><input type="checkbox" id="useUserBrowser"> Use my browser <span class="warn-hint">(opens a new tab in your own Chrome instead of a separate window — requires Chrome already running with --remote-debugging-port; see run.py "real-browser" docstring for setup)</span></label>
          <label class="check-row" id="tabReusePolicyRow" style="display:none;">
            Continuing in that tab:
            <select id="tabReusePolicy">
              <option value="ask">Ask each time (default, safest)</option>
              <option value="always_reuse">Always continue in the same tab (no prompts)</option>
              <option value="always_new_tab">Always open a new tab</option>
            </select>
          </label>
          <label class="check-row"><input type="checkbox" id="autoApprove"> Auto-approve permission prompts <span class="warn-hint">(lets the agent act without asking)</span></label>
        </div>
        <div class="composer-send-row">
          <button class="send-btn" id="btnRun">Plan task</button>
          <button class="stop-btn" id="btnStop" style="display:none;">Stop</button>
          <span class="composer-error" id="composerError"></span>
        </div>
      </div>
    </div>

    <!-- RIGHT RAIL: LOG (plan now lives in the chat, in real time) -->
    <div class="right-rail">
      <div class="col log">
        <div class="col-header"><span class="eyebrow">Log</span><span class="mono" id="logCount" style="font-size:11px;color:var(--faint)"></span></div>
        <div class="col-body mono" id="logBody"><div class="log-placeholder">Select or start a task to see its step log.</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const API = "";

let tasks = [];          // last known snapshot from GET /tasks
let selectedConvId = null; // conversation currently shown in Chat/Log, or null = "new session"
const liveSteps = {};        // task_id -> [{step, cmd, result, success}, ...] from SSE, real-time
const pendingApprovals = {}; // task_id -> {request_id, cmd} — awaiting a human decision right now (permission prompts during a run)
// W13: plan review now happens *before* any task exists — POST /api/generate_plan
// returns the plan synchronously, the user reviews/edits/approves it locally, and only
// then does POST /api/execute_plan actually create a task. pendingPlan holds that
// in-review state; there is at most one at a time (the composer is disabled while one
// is pending — see requestPlan()).
let pendingPlan = null;      // { sessionId, url, goal, planDraft, requestParams } | null
const runningPlans = {};     // task_id -> plan text, set right when execute_plan succeeds so the
                              // approved plan stays visible in the chat while the task is still
                              // running (task.result.plan only exists once it's done)
const liveConnections = {};  // task_id -> EventSource, one live stream per running task
let logVisible = false;      // Log panel is collapsed until the user explicitly clicks "Show log"

// W14: Website Learning & Manual Generation — banner shown above the composer when the
// current Target URL's site has no manual yet, plus live progress while crawling it.
let siteManualStatus = null; // { exists, version } for the current url, or null = not checked yet
let learnProgress = null;    // { learnId, done, total, checklist: [names], status, version?, errorMessage? } | null
let manualCheckTimer = null; // debounce handle for checkSiteManualStatus()
// W18: { exists } for the current url's domain, or null = not checked yet — drives the
// "ใช้บัญชีที่บันทึกไว้ / เข้าสู่ระบบด้วยบัญชีอื่น" choice in the learn banner instead of
// always showing blank username/password fields
let siteCredentialsStatus = null;
let learnUseNewAccount = false; // toggled by the radio choice — only relevant when siteCredentialsStatus.exists

// ---- Conversations: the backend only knows about individual tasks (one orchestrator
// run each), but the UI groups a sequence of them into one continuous chat thread so
// you can send a follow-up command without starting a "New session" every time.
// Persisted in localStorage (task_id -> conversation membership) so a page reload
// doesn't scatter an existing thread back into separate history entries.
const CONV_STORAGE_KEY = "agentConsoleConversations";
let conversations = {}; // { [convId]: [task_id, task_id, ...] } in submission order
try {
  conversations = JSON.parse(localStorage.getItem(CONV_STORAGE_KEY) || "{}");
} catch (e) {
  conversations = {};
}

function saveConversations() {
  try { localStorage.setItem(CONV_STORAGE_KEY, JSON.stringify(conversations)); } catch (e) {}
}

// ---- Target URL history: remembered client-side (localStorage) so it survives a page
// reload/server restart independently of task history (which lives in the backend's
// in-memory TaskManager and is lost on restart) — feeds the <datalist> under the
// "Target URL" field so previously used sites show up as suggestions while typing.
const URL_HISTORY_KEY = "agentConsoleUrlHistory";
const URL_HISTORY_MAX = 20;
let urlHistory = [];
try {
  urlHistory = JSON.parse(localStorage.getItem(URL_HISTORY_KEY) || "[]");
} catch (e) {
  urlHistory = [];
}

function renderUrlHistory() {
  $("urlHistory").innerHTML = urlHistory.map((u) => `<option value="${escapeHtml(u)}"></option>`).join("");
}

function rememberUrl(url) {
  url = (url || "").trim();
  if (!url) return;
  urlHistory = [url, ...urlHistory.filter((u) => u !== url)].slice(0, URL_HISTORY_MAX);
  try { localStorage.setItem(URL_HISTORY_KEY, JSON.stringify(urlHistory)); } catch (e) {}
  renderUrlHistory();
}

function conversationIdForTask(taskId) {
  for (const convId in conversations) {
    if (conversations[convId].includes(taskId)) return convId;
  }
  return null;
}

// Tasks the backend already knows about that this browser hasn't grouped yet (first
// time seeing them — e.g. created before this feature existed, or from another tab)
// each get their own solo conversation so they still show up in the history list.
function ensureConversationFor(taskId) {
  const existing = conversationIdForTask(taskId);
  if (existing) return existing;
  const convId = "conv-" + taskId;
  conversations[convId] = [taskId];
  saveConversations();
  return convId;
}

function tasksInConversation(convId) {
  const ids = conversations[convId] || [];
  return ids.map((id) => tasks.find((t) => t.task_id === id)).filter(Boolean);
}

function latestTaskInConversation(convId) {
  const ts = tasksInConversation(convId);
  return ts.length ? ts[ts.length - 1] : null;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function fmtTime(epochSeconds) {
  return new Date(epochSeconds * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function dayLabel(epochSeconds) {
  const d = new Date(epochSeconds * 1000);
  const today = new Date();
  const yest = new Date(today); yest.setDate(today.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  if (sameDay(d, today)) return "Today";
  if (sameDay(d, yest)) return "Yesterday";
  return d.toLocaleDateString([], { month: "short", day: "numeric" });
}

function formatCmd(cmd) {
  if (!cmd || typeof cmd !== "object") return String(cmd);
  const type = cmd.type || "action";
  const rest = Object.entries(cmd)
    .filter(([k]) => k !== "type")
    .map(([k, v]) => `${k}=${typeof v === "string" ? JSON.stringify(v) : v}`)
    .join(" ");
  return rest ? `${type} ${rest}` : type;
}

const ACTION_VERBS = {
  click: "Click", submit: "Submit", delete: "Delete", purchase: "Purchase", pay: "Pay", check: "Check",
};

// Human-readable line for the Log panel: prefers the element's real name (h.label, from
// perception.py — the button/field text on the page) over raw index numbers, since a
// bare index means nothing to a person watching the log.
function describeCmd(h) {
  const cmd = h.cmd || {};
  const type = cmd.type || "action";
  const target = h.label ? `"${h.label}"` : (cmd.index !== undefined ? `#${cmd.index}` : "");

  if (type === "goto") return `Go to ${cmd.url || ""}`;
  if (type === "fill") {
    const field = target || "field";
    return `Fill ${field}: ${JSON.stringify(cmd.text ?? "")}`;
  }
  if (type === "select") {
    const field = target || "dropdown";
    return `Select ${field}: ${JSON.stringify(cmd.label ?? "")}`;
  }
  if (type === "scroll") return `Scroll ${cmd.direction || "down"}`;
  if (type === "go_back") return "Go back";
  if (type === "switch_tab") return `Switch to tab ${cmd.tab_index}`;
  if (type === "wait") return "Wait for page to settle";
  if (ACTION_VERBS[type]) return target ? `${ACTION_VERBS[type]} ${target}` : ACTION_VERBS[type];
  return formatCmd(cmd);
}

function truncate(s, n) {
  s = String(s);
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

// ---------------- Networking ----------------

async function checkHealth() {
  try {
    const r = await fetch(API + "/health");
    $("healthDot").classList.toggle("up", r.ok);
  } catch (e) {
    $("healthDot").classList.remove("up");
  }
}

async function refreshPool() {
  try {
    const r = await fetch(API + "/pool/status");
    if (!r.ok) return;
    const s = await r.json();
    $("poolText").textContent = `pool ${s.in_use}/${s.size}`;
  } catch (e) {}
}

async function refreshTasks() {
  try {
    const r = await fetch(API + "/tasks");
    if (!r.ok) return;
    tasks = await r.json();
    tasks.sort((a, b) => b.created_at - a.created_at);
    for (const t of tasks) {
      ensureConversationFor(t.task_id);
      // Reconnect live streams for any task still running (e.g. after a page reload)
      // so pending approvals / step updates aren't silently missed.
      if (t.status === "running") openStream(t.task_id);
    }
    renderHistory();
    renderSelected();
  } catch (e) {}
}

// ---------------- Real-time stream (SSE) + human-in-the-loop ----------------

function openStream(taskId) {
  if (liveConnections[taskId]) return;
  const es = new EventSource(`${API}/tasks/${taskId}/stream`);
  liveConnections[taskId] = es;
  es.onmessage = (ev) => {
    let event;
    try { event = JSON.parse(ev.data); } catch (e) { return; }
    handleStreamEvent(taskId, event);
  };
  es.onerror = () => {
    es.close();
    delete liveConnections[taskId];
  };
}

function closeStream(taskId) {
  const es = liveConnections[taskId];
  if (es) {
    es.close();
    delete liveConnections[taskId];
  }
}

function handleStreamEvent(taskId, event) {
  if (event.kind === "step") {
    (liveSteps[taskId] || (liveSteps[taskId] = [])).push(event);
  } else if (event.kind === "approval_request") {
    // W13: this is always a permission prompt for an action now — plan review happens
    // before the task exists at all (see requestPlan()/approvePlan()), so a
    // task submitted via execute_plan never emits a "confirm_plan" kind here.
    pendingApprovals[taskId] = { request_id: event.request_id, cmd: event.cmd };
  } else if (event.kind === "auto_approved") {
    (liveSteps[taskId] || (liveSteps[taskId] = [])).push({
      step: null, cmd: event.cmd, result: "Auto-approved (auto-approve enabled)", success: true,
    });
  } else if (event.kind === "approval_timeout") {
    // Nobody answered the plan/permission prompt in time — the backend already
    // resolved it as denied, so just drop the stale prompt from the UI too.
    delete pendingApprovals[taskId];
  } else if (event.kind === "task_done") {
    delete pendingApprovals[taskId];
    closeStream(taskId);
    refreshTasks();
  }
  if (selectedConvId && conversationIdForTask(taskId) === selectedConvId) renderSelected();
  renderHistory();
}

async function respondApproval(taskId, requestId, approved) {
  delete pendingApprovals[taskId];
  renderHistory();
  if (selectedConvId && conversationIdForTask(taskId) === selectedConvId) renderSelected();
  try {
    await fetch(`${API}/tasks/${taskId}/respond`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ request_id: requestId, approved }),
    });
  } catch (e) {}
}

async function stopTask(taskId) {
  $("btnStop").disabled = true;
  try {
    await fetch(`${API}/tasks/${taskId}/stop`, { method: "POST" });
  } catch (e) {
  } finally {
    $("btnStop").disabled = false;
  }
}

// W13: plan review is 2 explicit steps now. requestPlan() asks the agent to draft a
// plan (POST /api/generate_plan — a single fast LLM call, no browser touched) and
// stores it as pendingPlan for local review; approvePlan() is what actually starts the
// task (POST /api/execute_plan) once the user is happy with it; cancelPlan() throws it
// away without ever having created anything server-side.
async function requestPlan() {
  const url = $("url").value.trim();
  const goal = $("goal").value.trim();
  $("composerError").textContent = "";
  if (!url || !goal) {
    $("composerError").textContent = "Please provide both a target URL and a goal.";
    return;
  }
  rememberUrl(url);
  if (pendingPlan) {
    $("composerError").textContent = "Approve or cancel the pending plan before requesting a new one.";
    return;
  }
  // Continuing an existing chat: don't let a follow-up overlap a turn that's still
  // running (each turn is its own independent browser run under the hood, so two
  // "in progress" turns in one thread would just be confusing, not actually parallel
  // work on the same page) — ask the user to wait or Stop the current one first.
  if (selectedConvId) {
    const latest = latestTaskInConversation(selectedConvId);
    if (latest && latest.status === "running") {
      $("composerError").textContent = "Wait for the current step to finish (or click Stop) before sending another command.";
      return;
    }
  }
  // W12: the session id IS the conversation id — generated client-side up front for a
  // brand-new conversation (rather than derived from the response afterward, like
  // before) so it can be sent to the backend and used to keep the same browser
  // page/context alive across every follow-up command in this thread instead of
  // reopening a fresh one each time (see core/session_registry.py). Every subsequent
  // turn in the same thread reuses the exact same id.
  const sessionId = selectedConvId || newSessionId();
  const requestParams = {
    max_steps: parseInt($("maxSteps").value, 10) || 30,
    provider: $("provider").value || null,
    headless: $("headless").checked,
    auto_approve: $("autoApprove").checked,
    use_user_browser: $("useUserBrowser").checked,
    tab_reuse_policy: $("useUserBrowser").checked ? $("tabReusePolicy").value : null,
  };
  $("btnRun").disabled = true;
  try {
    const r = await fetch(API + "/api/generate_plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, goal, provider: requestParams.provider, session_id: sessionId }),
    });
    if (!r.ok) {
      const err = await r.text();
      $("composerError").textContent = "Failed to generate plan: " + err;
      return;
    }
    const { plan } = await r.json();
    pendingPlan = { sessionId, url, goal, planDraft: plan, requestParams, editing: false };
    // Selecting this conversation now (even though no task exists yet) so the pending
    // plan bubble renders in the right thread and, for a brand-new chat, so it doesn't
    // look like nothing happened after clicking Run.
    selectedConvId = sessionId;
    $("goal").value = "";
    renderHistory();
    renderSelected();
  } finally {
    $("btnRun").disabled = false;
  }
}

async function approvePlan() {
  if (!pendingPlan) return;
  const { sessionId, url, goal, planDraft, requestParams } = pendingPlan;
  const payload = {
    url,
    goal,
    // Confirming persists this plan into Plan Memory (backend/app/core/plan_memory.py)
    // regardless of whether it was edited — future runs of a semantically similar goal
    // on this domain reuse it directly instead of asking the LLM to draft again.
    plan: planDraft,
    session_id: sessionId,
    max_steps: requestParams.max_steps,
    provider: requestParams.provider,
    headless: requestParams.headless,
    auto_approve: requestParams.auto_approve,
    use_user_browser: requestParams.use_user_browser,
    tab_reuse_policy: requestParams.tab_reuse_policy,
  };
  try {
    const r = await fetch(API + "/api/execute_plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!r.ok) {
      const err = await r.text();
      $("composerError").textContent = "Failed to start task: " + err;
      return;
    }
    const created = await r.json();
    if (planDraft) runningPlans[created.task_id] = planDraft;

    if (!conversations[sessionId]) conversations[sessionId] = [];
    conversations[sessionId].push(created.task_id);
    saveConversations();
    selectedConvId = sessionId;
    pendingPlan = null;

    liveSteps[created.task_id] = [];
    openStream(created.task_id);
    await refreshTasks();
  } catch (e) {
    $("composerError").textContent = "Failed to start task.";
  }
}

function cancelPlan() {
  // Nothing was ever created server-side (no task, no session) — this is purely local
  // state being thrown away.
  pendingPlan = null;
  renderHistory();
  renderSelected();
}

function newSessionId() {
  if (window.crypto && crypto.randomUUID) return "sess-" + crypto.randomUUID();
  return "sess-" + Date.now() + "-" + Math.random().toString(36).slice(2);
}

// ---------------- W14: Website Learning & Manual Generation ----------------

function scheduleManualStatusCheck() {
  // Debounced — fires while typing a URL, don't hammer the endpoint on every keystroke.
  clearTimeout(manualCheckTimer);
  manualCheckTimer = setTimeout(checkSiteManualStatus, 400);
}

async function checkSiteManualStatus() {
  const url = $("url").value.trim();
  if (!url || learnProgress) {
    // Don't clobber an in-progress/just-finished learn banner with a stale "checking"
    // pass — learnProgress's own lifecycle (startLearningSite/openLearnStream) clears
    // itself and re-checks explicitly when it's actually done.
    if (!url) { siteManualStatus = null; siteCredentialsStatus = null; renderManualBanner(); }
    return;
  }
  learnUseNewAccount = false;  // รีเซ็ตตัวเลือกทุกครั้งที่ URL เปลี่ยน — ค่าเริ่มต้นคือ "ใช้บัญชีที่บันทึกไว้" ถ้ามี
  try {
    const r = await fetch(`${API}/api/site-manual/status?url=${encodeURIComponent(url)}`);
    siteManualStatus = r.ok ? await r.json() : null;
  } catch (e) {
    siteManualStatus = null;
  }
  // W18: เช็คว่ามี credential เก็บไว้แล้วสำหรับโดเมนนี้ไหม — ขับ radio choice "ใช้บัญชีที่
  // บันทึกไว้ / เข้าสู่ระบบด้วยบัญชีอื่น" แทนที่จะโชว์ช่องกรอกเปล่าๆ ทุกครั้ง
  try {
    const domain = new URL(url).hostname;
    const cr = await fetch(`${API}/api/site-manual/${encodeURIComponent(domain)}/credentials/status`);
    siteCredentialsStatus = cr.ok ? await cr.json() : null;
  } catch (e) {
    siteCredentialsStatus = null;
  }
  renderManualBanner();
}

// W18: ถ้ามี credential เก็บไว้แล้วสำหรับโดเมนนี้ (siteCredentialsStatus.exists) โชว์ radio
// ให้เลือก "ใช้บัญชีที่บันทึกไว้" (ค่าเริ่มต้น — ไม่โชว์ช่องกรอกเลย ไม่ต้องกรอกซ้ำ) กับ
// "เข้าสู่ระบบด้วยบัญชีอื่น" (เลือกแล้วค่อยโชว์ช่อง username/password ให้กรอกใหม่) ถ้ายังไม่
// เคยมี credential เก็บไว้เลย ก็โชว์ช่องกรอกตรงๆ เหมือนเดิม (ไม่มีอะไรให้เลือก)
function renderCredentialFieldsHtml() {
  if (siteCredentialsStatus && siteCredentialsStatus.exists) {
    const fieldsHtml = learnUseNewAccount ? `
        <div class="manual-banner-login-fields">
          <input type="text" id="learnUsername" placeholder="Username ใหม่" autocomplete="off" />
          <input type="password" id="learnPassword" placeholder="Password ใหม่" autocomplete="off" />
        </div>` : "";
    return `
      <div class="manual-banner-cred-choice">
        <label><input type="radio" name="credChoice" data-cred-choice="saved" ${!learnUseNewAccount ? "checked" : ""} /> ใช้บัญชีที่บันทึกไว้</label>
        <label><input type="radio" name="credChoice" data-cred-choice="new" ${learnUseNewAccount ? "checked" : ""} /> เข้าสู่ระบบด้วยบัญชีอื่น</label>
      </div>${fieldsHtml}`;
  }
  return `
        <div class="manual-banner-login-fields">
          <input type="text" id="learnUsername" placeholder="Username (ถ้าเว็บนี้ต้อง login — ไม่บังคับ, จะจำไว้ใช้อัตโนมัติครั้งหน้า)" autocomplete="off" />
          <input type="password" id="learnPassword" placeholder="Password (ไม่บังคับ)" autocomplete="off" />
        </div>`;
}

function renderManualBanner() {
  const box = $("manualBanner");
  if (learnProgress) {
    if (learnProgress.status === "running") {
      const pct = learnProgress.total ? Math.min(100, Math.round((learnProgress.done / learnProgress.total) * 100)) : 0;
      const items = learnProgress.checklist
        .map((name) => `<div class="item done">&check; ${escapeHtml(name)}</div>`)
        .join("");
      // W16: บอกด้วยว่า "ตอนนี้" กำลังเดินอยู่หน้าไหน (อัปเดตจาก page_start event — มา
      // ก่อน page_done เสมอ เพราะยิงตอนหน้าโหลดเสร็จ ก่อนรอ LLM อธิบาย) คู่กับ browser
      // จริงที่เปิดแบบมองเห็นได้ (headless=False, ดู routes.py::learn_site()) ให้เห็นทั้ง
      // ในหน้าต่าง browser จริงๆ และในข้อความบนหน้าเว็บนี้พร้อมกัน
      const currentLine = learnProgress.currentUrl
        ? `<div class="manual-banner-current">กำลังเรียนรู้ตอนนี้: ${escapeHtml(learnProgress.currentUrl)}</div>`
        : "";
      // W16: ถ้ากำลังไล่กดปุ่มอยู่ (button_explored event) โชว์ชื่อปุ่มด้วย — เห็นทั้งว่า
      // "อยู่หน้าไหน" และ "กำลังลองปุ่มไหน" พร้อมกัน
      const buttonLine = learnProgress.currentButton
        ? `<div class="manual-banner-current">กำลังลองกดปุ่ม: ${escapeHtml(learnProgress.currentButton)}</div>`
        : "";
      box.innerHTML = `
        <div class="manual-banner learning">
          <div class="manual-banner-title">กำลังเรียนรู้เว็บไซต์...</div>
          ${currentLine}
          ${buttonLine}
          <div class="manual-banner-checklist">${items}</div>
          <div class="manual-banner-pct">${pct}%</div>
        </div>`;
    } else if (learnProgress.status === "done") {
      box.innerHTML = `
        <div class="manual-banner done">
          <div><b>เรียนรู้เว็บไซต์เรียบร้อยแล้ว</b></div>
          <div>Manual Version ${learnProgress.version ?? "?"} ถูกสร้างแล้ว</div>
        </div>`;
    } else {
      box.innerHTML = `
        <div class="manual-banner error">
          เรียนรู้เว็บไซต์ไม่สำเร็จ: ${escapeHtml(learnProgress.errorMessage || "unknown error")}
        </div>`;
    }
    box.style.display = "";
    return;
  }
  if (siteManualStatus && siteManualStatus.exists === false) {
    box.innerHTML = `
      <div class="manual-banner missing">
        <div class="manual-banner-title">เว็บไซต์นี้ยังไม่มีคู่มือ</div>
        ${renderCredentialFieldsHtml()}
        <button type="button" class="manual-banner-learn-btn" data-learn-site="true">เรียนรู้เว็บไซต์</button>
      </div>`;
    box.style.display = "";
    return;
  }
  if (siteManualStatus && siteManualStatus.exists === true) {
    // W16: เว็บไซต์อาจอัปเดตหน้าตา/โครงสร้างไปหลังจากเรียนรู้ครั้งก่อน — ให้กดเรียนรู้
    // ใหม่ทั้งเว็บได้ตลอด ไม่ต้องรอ manual หาย/พังก่อน (ต่างจาก relearn-page ที่ซ่อมทีละ
    // หน้าตอน selector ใช้งานไม่ได้ endpoint นี้เรียก POST /api/site-manual/learn ตัวเดิม
    // ซ้ำ — crawl ใหม่ทั้งเว็บ + bump version เหมือนเดิมทุกประการ)
    box.innerHTML = `
      <div class="manual-banner known">
        <div class="manual-banner-title">มีคู่มือเว็บไซต์นี้แล้ว (Version ${siteManualStatus.version})</div>
        ${renderCredentialFieldsHtml()}
        <button type="button" class="manual-banner-learn-btn relearn" data-learn-site="true">เรียนรู้ใหม่อีกรอบ</button>
      </div>`;
    box.style.display = "";
    return;
  }
  box.style.display = "none";
  box.innerHTML = "";
}

async function startLearningSite() {
  const url = $("url").value.trim();
  if (!url || learnProgress) return;
  // W15: อ่านค่า username/password ตอนกดปุ่มเท่านั้น — ส่งไปใน request เดียวแล้วทิ้ง
  // ไม่เก็บลง learnProgress/state ใดๆ เพื่อไม่ให้ credential ค้างอยู่ใน memory ฝั่ง UI
  const usernameEl = document.getElementById("learnUsername");
  const passwordEl = document.getElementById("learnPassword");
  const username = usernameEl && usernameEl.value ? usernameEl.value : null;
  const password = passwordEl && passwordEl.value ? passwordEl.value : null;
  // W18: "ใช้บัญชีที่บันทึกไว้" ถูกเลือกอยู่ (ไม่ได้กดเปลี่ยนเป็นบัญชีใหม่) และมี credential
  // เก็บไว้จริง — ส่ง flag นี้แทนตัว username/password (ซึ่งจะเป็น null ทั้งคู่อยู่แล้ว
  // เพราะช่องกรอกไม่ได้ถูก render เลยในเคสนี้) ให้ backend ไปดึงค่าที่เก็บไว้มาใช้เอง
  const useSavedCredentials = !!(siteCredentialsStatus && siteCredentialsStatus.exists && !learnUseNewAccount);
  learnProgress = { learnId: null, done: 0, total: 1, checklist: [], status: "running", currentUrl: url };
  renderManualBanner();
  try {
    const r = await fetch(`${API}/api/site-manual/learn`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        url, provider: $("provider").value || null, username, password,
        use_saved_credentials: useSavedCredentials,
      }),
    });
    if (!r.ok) {
      learnProgress = { status: "error", errorMessage: await r.text() };
      renderManualBanner();
      return;
    }
    const created = await r.json();
    learnProgress.learnId = created.learn_id;
    openLearnStream(created.learn_id);
  } catch (e) {
    learnProgress = { status: "error", errorMessage: String(e) };
    renderManualBanner();
  }
}

function openLearnStream(learnId) {
  const es = new EventSource(`${API}/api/site-manual/learn/${learnId}/stream`);
  es.onmessage = (ev) => {
    let event;
    try { event = JSON.parse(ev.data); } catch (e) { return; }
    if (!learnProgress) { es.close(); return; }
    if (event.kind === "page_start") {
      learnProgress.currentUrl = event.url;
      learnProgress.currentButton = null;
      renderManualBanner();
    } else if (event.kind === "button_explored") {
      // W16: crawler กำลังไล่กดปุ่มปลอดภัยบนหน้านี้อยู่ (ดู crawler.py::_explore_buttons)
      // — โชว์ชื่อปุ่มที่กำลังลองกด คู่กับ browser จริงที่เปิดแบบมองเห็นได้
      learnProgress.currentButton = event.button;
      renderManualBanner();
    } else if (event.kind === "page_done") {
      learnProgress.done = event.done;
      learnProgress.total = event.total;
      learnProgress.checklist.push(event.name);
      renderManualBanner();
    } else if (event.kind === "learn_done") {
      es.close();
      if (event.status === "done") {
        learnProgress = { status: "done", version: event.result ? event.result.version : null };
      } else {
        learnProgress = { status: "error", errorMessage: event.error || "" };
      }
      renderManualBanner();
      // Re-check for real (not just trusting our own optimistic state) so the banner
      // fully clears once storage confirms the manual actually exists on disk now.
      setTimeout(() => { learnProgress = null; checkSiteManualStatus(); }, 2500);
    }
  };
  es.onerror = () => { es.close(); };
}

// ---------------- Rendering ----------------

function renderHistory() {
  $("btnNewSession").classList.toggle("active", selectedConvId === null);
  const list = $("historyList");
  const convIds = Object.keys(conversations).filter((id) => tasksInConversation(id).length > 0);
  if (!convIds.length) {
    list.innerHTML = '<div class="empty-hint">No tasks yet — start one below.</div>';
    return;
  }
  // Most recently active conversation first (matches typical chat-app ordering).
  convIds.sort((a, b) => latestTaskInConversation(b).created_at - latestTaskInConversation(a).created_at);

  let html = "";
  let lastGroup = null;
  for (const convId of convIds) {
    const convTasks = tasksInConversation(convId);
    const first = convTasks[0];
    const latest = convTasks[convTasks.length - 1];
    const group = dayLabel(latest.created_at);
    if (group !== lastGroup) {
      html += `<div class="history-group">${group}</div>`;
      lastGroup = group;
    }
    const status = (latest.status || "running").toLowerCase();
    const needsApproval = !!pendingApprovals[latest.task_id];
    const badge = needsApproval
      ? '<span class="badge needs-approval">action needed</span>'
      : `<span class="badge ${status}">${status}</span>`;
    const turnCount = convTasks.length > 1 ? `<span class="mono">${convTasks.length}&times;</span>` : "";
    html += `
      <button class="list-item ${convId === selectedConvId ? "active" : ""}" data-conv-id="${convId}">
        <div class="title">${escapeHtml(first.goal)}</div>
        <div class="meta"><span class="mono">${fmtTime(latest.created_at)}</span>${turnCount}${badge}</div>
      </button>`;
  }
  list.innerHTML = html;
  list.querySelectorAll(".list-item").forEach((el) => {
    el.addEventListener("click", () => {
      if (pendingPlan && pendingPlan.sessionId !== el.dataset.convId) {
        $("composerError").textContent = "Approve or cancel the pending plan before switching conversations.";
        return;
      }
      selectedConvId = el.dataset.convId;
      const latest = latestTaskInConversation(selectedConvId);
      if (latest) {
        // Prefill so a follow-up command doesn't require retyping the target site.
        $("url").value = latest.url;
        if (latest.provider) $("provider").value = latest.provider;
        if (latest.status === "running") openStream(latest.task_id);
      }
      renderHistory();
      renderSelected();
      learnProgress = null;
      checkSiteManualStatus();
    });
  });
}

function statusMeta(task) {
  if (!task) {
    if (pendingPlan && pendingPlan.sessionId === selectedConvId) return { cls: "running", label: "Reviewing plan" };
    return { cls: "idle", label: "Idle" };
  }
  if (pendingApprovals[task.task_id]) return { cls: "error", label: "Needs approval" };
  const s = (task.status || "running").toLowerCase();
  if (s === "running") return { cls: "running", label: "Running" };
  if (s === "cancelled") return { cls: "cancelled", label: "Stopped" };
  if (s === "error") return { cls: "error", label: "Error" };
  if (task.result && task.result.success === false) return { cls: "error", label: "Failed" };
  return { cls: "done", label: "Done" };
}

function renderTopbar(convTasks) {
  const pending = pendingPlan && pendingPlan.sessionId === selectedConvId ? pendingPlan : null;
  const first = convTasks.length ? convTasks[0] : pending;
  const latest = convTasks.length ? convTasks[convTasks.length - 1] : null;
  $("sessionName").innerHTML = first
    ? `Session &mdash; <b>${escapeHtml(truncate(first.goal, 70))}</b>${convTasks.length > 1 ? ` <span class="mono" style="color:var(--faint)">(${convTasks.length} turns)</span>` : ""}`
    : "New session";
  const meta = statusMeta(latest);
  const pill = $("statusPill");
  pill.className = "status-pill " + meta.cls;
  $("statusText").textContent = meta.label;

  const stopBtn = $("btnStop");
  if (latest && latest.status === "running") {
    stopBtn.style.display = "";
    stopBtn.dataset.task = latest.task_id;
  } else {
    stopBtn.style.display = "none";
    delete stopBtn.dataset.task;
  }
}

// Renders one turn (a single task run) of the conversation — a user bubble with the
// goal, followed by the agent's plan/permission/progress/result for that turn.
function renderTaskTurn(task) {
  let html = `
    <div class="msg user">
      <div class="avatar">You</div>
      <div>
        <div class="bubble">${escapeHtml(task.goal)}</div>
        <div class="meta-line mono">${escapeHtml(task.url)}</div>
      </div>
    </div>`;

  const agentIcon = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 1 1 8 8" stroke="white" stroke-width="2.6" stroke-linecap="round"/></svg>`;

  const pending = pendingApprovals[task.task_id];

  // W13: the plan (if any) was already reviewed and approved *before* this task was
  // even created (see requestPlan()/approvePlan()) — this bubble is purely a record of
  // what was approved, never an in-progress approval prompt anymore. runningPlans
  // covers the "still running" window (task.result doesn't exist yet); task.result.plan
  // takes over once it's done.
  const planText = runningPlans[task.task_id] || (task.result && task.result.plan) || "";
  if (planText) {
    const badge = task.result
      ? `<span class="plan-badge ${task.result.success ? "ok" : "fail"}">${task.result.success ? "succeeded" : "did not finish"}</span>`
      : "";
    html += `
      <div class="msg agent">
        <div class="avatar">${agentIcon}</div>
        <div>
          <div class="bubble plan-bubble">
            <div class="plan-bubble-title">Plan${badge}</div>
            <div class="plan-bubble-text">${escapeHtml(planText)}</div>
          </div>
        </div>
      </div>`;
  }

  if (task.status === "running") {
    if (pending && pending.cmd) {
      html += `
        <div class="msg agent">
          <div class="avatar">${agentIcon}</div>
          <div>
            <div class="bubble approval-bubble">
              <div class="approval-title">Permission needed</div>
              <div class="approval-cmd">${escapeHtml(pending.cmd.element_label || describeCmd({ cmd: pending.cmd, label: pending.cmd.element_label }))}</div>
              <div class="approval-actions">
                <button class="btn-approve" data-task="${task.task_id}" data-request="${pending.request_id}" data-approve="true">Approve</button>
                <button class="btn-deny" data-task="${task.task_id}" data-request="${pending.request_id}" data-approve="false">Deny</button>
              </div>
            </div>
          </div>
        </div>`;
    } else {
      const liveCount = (liveSteps[task.task_id] || []).length;
      const progress = liveCount ? ` &mdash; ${liveCount} step${liveCount === 1 ? "" : "s"} so far` : "";
      html += `
        <div class="msg agent">
          <div class="avatar">${agentIcon}</div>
          <div>
            <div class="bubble">Working on it${progress}. See the Log panel for step-by-step progress.</div>
          </div>
        </div>`;
    }
  } else if (task.status === "cancelled") {
    html += `
      <div class="msg agent">
        <div class="avatar">${agentIcon}</div>
        <div>
          <div class="bubble">Stopped by you.</div>
        </div>
      </div>`;
  } else if (task.status === "error") {
    html += `
      <div class="msg agent error">
        <div class="avatar">${agentIcon}</div>
        <div>
          <div class="bubble">The task ended with an error before finishing:<br>${escapeHtml(task.error || "unknown error")}</div>
        </div>
      </div>`;
  } else if (task.result) {
    const r = task.result;
    html += `
      <div class="msg agent ${r.success ? "" : "error"}">
        <div class="avatar">${agentIcon}</div>
        <div>
          <div class="bubble">${escapeHtml(r.message || (r.success ? "Done." : "Did not finish successfully."))}</div>
          <div class="stat-line"><span>${r.steps} step${r.steps === 1 ? "" : "s"}</span>${r.tokens && r.tokens.total ? `<span>${r.tokens.total} tokens</span>` : ""}</div>
        </div>
      </div>`;
  }
  return html;
}

// Full chat transcript for the selected conversation: every turn (task) in submission
// order, so a follow-up command shows up right below the previous turn instead of
// replacing it — this is what lets you keep chatting without starting a new session.
function renderTranscript(convTasks) {
  const box = $("transcript");
  const pending = pendingPlan && pendingPlan.sessionId === selectedConvId ? pendingPlan : null;
  if (!convTasks.length && !pending) {
    box.innerHTML = '<div class="transcript-empty">Set a target URL and goal below, then click "Plan task" to draft a plan and start a new session.</div>';
    return;
  }
  let html = convTasks.map(renderTaskTurn).join("");
  if (pending) html += renderPendingPlanTurn(pending);
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

// W13: a plan awaiting local review — not a task yet (no task_id, no backend state at
// all), so this is driven entirely by the pendingPlan object rather than SSE/polling.
// W20: view/edit toggle brought back (like the old task-based plan flow) — default is
// a read-only view (.plan-bubble-text, no scrolling needed — grows to fit the whole
// plan) with an explicit "Edit" button; clicking it swaps in a textarea sized (via
// `rows`) to the plan's actual line count so the full text is visible without an
// internal scrollbar either. Textarea edits already live-sync into pending.planDraft
// via the document-level "input" listener below, so there's no separate save/discard
// step — "Done editing" just switches the view back.
function renderPendingPlanTurn(pending) {
  const agentIcon = `<svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 1 1 8 8" stroke="white" stroke-width="2.6" stroke-linecap="round"/></svg>`;
  const rows = Math.max(6, pending.planDraft.split("\n").length + 1);
  const bodyHtml = pending.editing
    ? `
          <textarea class="plan-edit-textarea" id="pendingPlanTextarea" rows="${rows}">${escapeHtml(pending.planDraft)}</textarea>
          <div class="approval-actions">
            <button class="btn-approve" data-approve-plan="true">Approve &amp; Run</button>
            <button class="btn-edit" data-plan-edit-done="true">Done editing</button>
            <button class="btn-deny" data-cancel-plan="true">Cancel</button>
          </div>`
    : `
          <div class="plan-bubble-text">${escapeHtml(pending.planDraft)}</div>
          <div class="approval-actions">
            <button class="btn-approve" data-approve-plan="true">Approve &amp; Run</button>
            <button class="btn-edit" data-plan-edit="true">Edit</button>
            <button class="btn-deny" data-cancel-plan="true">Cancel</button>
          </div>`;
  return `
    <div class="msg user">
      <div class="avatar">You</div>
      <div>
        <div class="bubble">${escapeHtml(pending.goal)}</div>
        <div class="meta-line mono">${escapeHtml(pending.url)}</div>
      </div>
    </div>
    <div class="msg agent">
      <div class="avatar">${agentIcon}</div>
      <div>
        <div class="bubble plan-bubble">
          <div class="plan-bubble-title">Plan<span class="plan-badge fail">awaiting approval</span></div>
          ${bodyHtml}
        </div>
      </div>
    </div>`;
}

function renderLogLine(h) {
  const lvl = h.cmd && h.cmd.type === "goto" ? "info" : (h.success ? "ok" : "err");
  return `
    <div class="log-line">
      <span class="t">${h.step ?? ""}</span>
      <span class="lvl ${lvl}">${lvl}</span>
      <span class="msg-text">${escapeHtml(describeCmd(h))}</span>
    </div>
    <div class="log-line" style="padding-top:0;">
      <span class="t"></span>
      <span class="lvl"></span>
      <span class="result-text">${escapeHtml(truncate(h.result, 160))}</span>
    </div>`;
}

function renderLog(task) {
  const body = $("logBody");
  const count = $("logCount");
  count.textContent = "";
  if (!task) {
    body.innerHTML = '<div class="log-placeholder">Select or start a task to see its step log.</div>';
    return;
  }
  const history = task.result && task.result.history;
  // ยังไม่มี history สุดท้าย (running อยู่ หรือถูก stop ก่อนจะได้ผลลัพธ์กลับมา) — โชว์
  // live steps ที่สตรีมมาแล้วแทน ดีกว่าไม่โชว์อะไรเลย (เห็นว่า agent ทำไปถึงไหนก่อนหยุด)
  const steps = (history && history.length) ? history : (liveSteps[task.task_id] || []);
  if (!steps.length) {
    body.innerHTML = task.status === "running"
      ? '<div class="log-placeholder">Waiting for the first step&hellip;</div>'
      : '<div class="log-placeholder">No steps recorded for this task.</div>';
    return;
  }
  const liveSuffix = task.status === "running" ? " (live)" : "";
  count.textContent = `${steps.length} step${steps.length === 1 ? "" : "s"}${liveSuffix}`;
  body.innerHTML = steps.map(renderLogLine).join("");
  if (task.status === "running") body.scrollTop = body.scrollHeight;
}

function renderSelected() {
  const convTasks = selectedConvId ? tasksInConversation(selectedConvId) : [];
  const latest = convTasks.length ? convTasks[convTasks.length - 1] : null;
  renderTopbar(convTasks);
  renderTranscript(convTasks);
  renderLog(latest);
  // A plan is pending review (in this or another conversation) — block requesting a
  // second one until it's approved or cancelled, rather than only catching it inside
  // requestPlan() after the click.
  $("btnRun").disabled = !!pendingPlan;
}

// ---------------- Log panel visibility (manual "Show log" toggle) ----------------

function updateLogVisibility() {
  $("mainGrid").classList.toggle("right-rail-hidden", !logVisible);
  $("btnToggleLog").textContent = logVisible ? "Hide log" : "Show log";
  $("btnToggleLog").classList.toggle("active", logVisible);
}

// ---------------- Theme ----------------

function applyTheme(theme) {
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("agentConsoleTheme", theme);
  $("themeToggle").querySelectorAll("button").forEach((b) => {
    b.classList.toggle("active", b.dataset.theme === theme);
  });
}

// ---------------- Wiring ----------------

// "Use my browser" bypasses headless entirely (agent connects to your already-running
// Chrome via CDP instead of launching one) — grey out "Headless" while it's checked so
// it's clear the setting has no effect in that mode.
$("useUserBrowser").addEventListener("change", () => {
  const active = $("useUserBrowser").checked;
  $("headless").disabled = active;
  if (active) $("headless").checked = false;
  $("tabReusePolicyRow").style.display = active ? "" : "none";
});

$("btnRun").addEventListener("click", requestPlan);
$("btnStop").addEventListener("click", () => {
  const taskId = $("btnStop").dataset.task;
  if (taskId) stopTask(taskId);
});
$("btnNewSession").addEventListener("click", async () => {
  const oldSessionId = selectedConvId;
  if (oldSessionId) {
    // Don't close the browser resources out from under a task that's still running on
    // them — same guard requestPlan() already uses before sending a follow-up.
    const latest = latestTaskInConversation(oldSessionId);
    if (latest && latest.status === "running") {
      $("composerError").textContent = "Wait for the current step to finish (or click Stop) before starting a new session.";
      return;
    }
  }
  if (pendingPlan && pendingPlan.sessionId === oldSessionId) pendingPlan = null;
  selectedConvId = null;
  renderHistory();
  renderSelected();
  if (oldSessionId) {
    try { await fetch(`${API}/sessions/${oldSessionId}/close`, { method: "POST" }); } catch (e) {}
  }
});
$("btnToggleLog").addEventListener("click", () => {
  logVisible = !logVisible;
  updateLogVisibility();
});
$("themeToggle").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-theme]");
  if (btn) applyTheme(btn.dataset.theme);
});
document.addEventListener("click", (e) => {
  if (e.target.closest("[data-approve-plan]")) {
    approvePlan();
    return;
  }
  if (e.target.closest("[data-cancel-plan]")) {
    cancelPlan();
    return;
  }
  if (e.target.closest("[data-plan-edit]")) {
    if (pendingPlan) { pendingPlan.editing = true; renderSelected(); }
    return;
  }
  if (e.target.closest("[data-plan-edit-done]")) {
    if (pendingPlan) { pendingPlan.editing = false; renderSelected(); }
    return;
  }
  if (e.target.closest("[data-learn-site]")) {
    startLearningSite();
    return;
  }
  const btn = e.target.closest("[data-approve]");
  if (!btn) return;
  respondApproval(btn.dataset.task, btn.dataset.request, btn.dataset.approve === "true");
});
document.addEventListener("change", (e) => {
  const radio = e.target.closest("[data-cred-choice]");
  if (radio) {
    learnUseNewAccount = radio.dataset.credChoice === "new";
    renderManualBanner();
  }
});
document.addEventListener("input", (e) => {
  // Keep the pending plan's draft in sync on every keystroke so a periodic re-render
  // (e.g. the 2.5s task poll) reconstructs the textarea with what's actually been
  // typed, not stale text.
  if (e.target.id === "pendingPlanTextarea" && pendingPlan) {
    pendingPlan.planDraft = e.target.value;
  }
});
$("url").addEventListener("input", scheduleManualStatusCheck);

// Enter submits the goal (like a chat input) — Shift+Enter still inserts a newline for
// a multi-line goal. Mirrors clicking "Plan task"; disabled while a plan is pending
// review (same guard the button itself respects).
$("goal").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!$("btnRun").disabled) requestPlan();
  }
});

const savedTheme = localStorage.getItem("agentConsoleTheme")
  || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
applyTheme(savedTheme);

updateLogVisibility();
renderUrlHistory();
renderSelected();
checkHealth();
refreshPool();
refreshTasks();
checkSiteManualStatus();
setInterval(checkHealth, 5000);
setInterval(refreshPool, 5000);
setInterval(refreshTasks, 2500);
</script>
